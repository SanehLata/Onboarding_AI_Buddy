<svg width="100%" viewBox="0 0 680 800" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; }
    .purple-outer { fill: #EEEDFE; stroke: #7F77DD; }
    .purple-tab   { fill: #D8D5F8; stroke: #7F77DD; }
    .teal-box     { fill: #E1F5EE; stroke: #1D9E75; }
    .blue-box     { fill: #E6F1FB; stroke: #378ADD; }
    .amber-box    { fill: #FAEEDA; stroke: #BA7517; }
    .coral-box    { fill: #FAECE7; stroke: #D85A30; }
    .green-box    { fill: #EAF3DE; stroke: #639922; }
    .gray-outer   { fill: #F1EFE8; stroke: #888780; }
    .gray-sub     { fill: #E2DFD7; stroke: #888780; }
  </style>
</defs>

<!-- UI -->
<rect class="purple-outer" x="20" y="20" width="640" height="86" rx="10" stroke-width="0.5"/>
<text class="th" x="340" y="42" text-anchor="middle">Streamlit UI</text>
<rect class="purple-tab" x="36"  y="52" width="98"  height="30" rx="5" stroke-width="0.5"/><text class="ts" x="85"  y="71" text-anchor="middle">Chat</text>
<rect class="purple-tab" x="144" y="52" width="98"  height="30" rx="5" stroke-width="0.5"/><text class="ts" x="193" y="71" text-anchor="middle">Access</text>
<rect class="purple-tab" x="252" y="52" width="118" height="30" rx="5" stroke-width="0.5"/><text class="ts" x="311" y="71" text-anchor="middle">Learning path</text>
<rect class="purple-tab" x="380" y="52" width="98"  height="30" rx="5" stroke-width="0.5"/><text class="ts" x="429" y="71" text-anchor="middle">Insights</text>
<rect class="purple-tab" x="488" y="52" width="154" height="30" rx="5" stroke-width="0.5"/><text class="ts" x="565" y="71" text-anchor="middle">Manager portal</text>
