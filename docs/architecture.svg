<rect class="blue-box" x="399" y="322" width="110" height="52" rx="7" stroke-width="0.5"/><text class="th" x="454" y="344" text-anchor="middle">Nudge</text><text class="ts" x="454" y="361" text-anchor="middle">Proactive tips</text>
<rect class="blue-box" x="523" y="322" width="110" height="52" rx="7" stroke-width="0.5"/><text class="th" x="578" y="344" text-anchor="middle">Progress</text><text class="ts" x="578" y="361" text-anchor="middle">Summary</text>

