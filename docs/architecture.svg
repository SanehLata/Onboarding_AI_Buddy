<rect class="amber-box" x="183" y="428" width="140" height="52" rx="7" stroke-width="0.5"/><text class="th" x="253" y="450" text-anchor="middle">Email</text><text class="ts" x="253" y="467" text-anchor="middle">Gmail · mock DL</text>
